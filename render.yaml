# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: memorylayer-demo-engine
    runtime: docker
    plan: free
    region: virginia
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: MEMORY_API_KEY
        sync: false
      - key: MEMORY_HOST
        value: "0.0.0.0"
      - key: MEMORY_DATA_DIR
        value: /data
