# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: memorylayer-demo-engine
    runtime: docker
    plan: free
    region: virginia
    branch: main
    dockerfilePath: ./Dockerfile
    # healthCheckPath omitted until @raajvamsy/memorylayer >1.3.4 — published server
    # returns 401 on GET /health when MEMORY_API_KEY is set on 0.0.0.0. Render then
    # never marks the deploy live. Re-enable /health after npm publish with auth fix.
    envVars:
      - key: MEMORY_API_KEY
        sync: false
      - key: MEMORY_HOST
        value: "0.0.0.0"
      - key: MEMORY_DATA_DIR
        value: /data
